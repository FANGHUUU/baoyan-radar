<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F4C81">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="保研雷达">
  <meta name="description" content="华电能源动力类专属保研夏令营与预推免信息看板">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>保研夏令营及预推免信息雷达</title>
  <style>
    :root {
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --sub: #64748b;
      --primary: #0F4C81;
      --border: #e2e8f0;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
      --cat-c9: #dc2626;
      --cat-985: #ea580c;
      --cat-211: #2563eb;
      --cat-institute: #7c3aed;
      --cat-double-first: #0891b2;
      --cat-strong: #059669;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, var(--primary), #1a6db5);
      color: #fff;
      padding: 16px 16px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 1.15rem; font-weight: 700; margin-bottom: 4px; }
    .header .sub { font-size: 0.7rem; opacity: 0.8; }
    .updated { font-size: 0.68rem; opacity: 0.7; margin-top: 4px; display: block; }

    .tab-bar {
      display: flex;
      gap: 4px;
      padding: 8px 12px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      position: sticky;
      top: 0;
      z-index: 9;
    }
    .tab {
      padding: 6px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--card);
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.12s;
      font-weight: 500;
    }
    .tab:hover { background: var(--bg); }
    .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .tab .tab-count { font-size: 0.65rem; opacity: 0.7; }

    .camp-list { padding: 8px 12px 20px; max-width: 700px; margin: 0 auto; }
    .camp-card {
      background: var(--card);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      box-shadow: var(--shadow);
      border-left: 3px solid var(--border);
      cursor: pointer;
      transition: all 0.1s;
    }
    .camp-card:active { opacity: 0.85; }
    .camp-card.c9 { border-left-color: var(--cat-c9); }
    .camp-card.\39 85 { border-left-color: var(--cat-985); }
    .camp-card.\32 11 { border-left-color: var(--cat-211); }
    .camp-card.institute { border-left-color: var(--cat-institute); }
    .camp-card.double_first { border-left-color: var(--cat-double-first); }
    .camp-card.strong { border-left-color: var(--cat-strong); }
    .camp-card.expired { opacity: 0.5; }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card-header .university { font-size: 0.9rem; font-weight: 700; }
    .card-header .school { font-size: 0.7rem; color: var(--sub); }
    .card-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2px; }
    .badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 0.6rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge.summer_camp { background: #dcfce7; color: #166534; }
    .badge.pre_admission { background: #fef3c7; color: #92400e; }
    .badge.open_day { background: #dbeafe; color: #1e40af; }
    .badge.direct_phd { background: #ede9fe; color: #5b21b6; }
    .badge.master_academic { background: #dcfce7; color: #166534; }
    .badge.master_professional { background: #dbeafe; color: #1e40af; }
    .badge.direct_phd_deg { background: #ede9fe; color: #5b21b6; }
    .badge.master_undecided { background: #f1f5f9; color: #475569; }
    .badge.outstanding { background: #fef3c7; color: #92400e; }

    .card-title { font-size: 0.82rem; font-weight: 600; margin: 4px 0; }
    .card-meta { font-size: 0.7rem; color: var(--sub); display: flex; flex-wrap: wrap; gap: 4px 12px; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 0.72rem; }
    .deadline { font-weight: 700; }
    .deadline.urgent { color: #dc2626; }
    .deadline.warn { color: #ea580c; }
    .deadline.ok { color: var(--sub); }

    .detail-panel {
      display: none;
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: 65vh;
      background: var(--card);
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
      z-index: 100;
      padding: 20px 18px;
      overflow-y: auto;
      transition: transform 0.25s;
    }
    .detail-panel.open { display: block; }
    .detail-close {
      position: absolute;
      top: 12px;
      right: 14px;
      background: var(--bg);
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .detail-section { margin-bottom: 12px; }
    .detail-section h3 { font-size: 0.7rem; color: var(--sub); margin-bottom: 4px; }
    .detail-section p { font-size: 0.82rem; }
    .detail-link {
      display: block;
      text-align: center;
      padding: 10px;
      margin-top: 8px;
      border-radius: 20px;
      background: var(--primary);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
    }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 99; }
    .overlay.show { display: block; }

    .footer {
      text-align: center;
      padding: 16px;
      font-size: 0.7rem;
      color: var(--sub);
    }
    .footer a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>

<header class="header">
  <h1>🎓 保研夏令营及预推免信息雷达</h1>
  <span class="sub">华电能源动力类专属 · 不含新疆/甘肃/西藏/内蒙古/黑龙江/辽宁</span>
  <span class="updated" id="updateTime">加载中...</span>
</header>

<div class="tab-bar" id="tabBar"></div>
<div class="camp-list" id="campList"></div>
<div class="footer">
  <span id="footerStats"></span> · <a href="/v2.html">切换到 v2 高级版</a>
</div>

<div class="overlay" id="overlay"></div>
<div class="detail-panel" id="detailPanel"></div>

<script>
const catLabels = { c9:'C9联盟', '985':'985高校', '211':'211高校', institute:'科研院所', double_first:'双一流', strong:'学科强校' };
const typeLabels = { summer_camp:'夏令营', pre_admission:'预推免', open_day:'开放日', direct_phd:'直博招生' };
const degreeLabels = { master_academic:'学硕', master_professional:'专硕', direct_phd:'直博', master_undecided:'硕士未区分' };
const CATS = ['c9','985','211','institute','double_first','strong'];

let camps = [];
let activeTab = 'all';

function formatDeadline(d) {
  if (!d) return '待定';
  const dt = new Date(d);
  const days = Math.ceil((dt - new Date()) / 86400000);
  const ds = (dt.getMonth()+1)+'月'+dt.getDate()+'日';
  if (days < 0) return ds + ' 已截止';
  if (days === 0) return '今天截止';
  return ds + ' (' + days + '天)';
}

function getDeadlineClass(d) {
  if (!d) return 'ok';
  const days = (new Date(d) - new Date()) / 86400000;
  if (days < 0) return 'urgent';
  if (days <= 7) return 'urgent';
  if (days <= 14) return 'warn';
  return 'ok';
}

function renderTabs() {
  const counts = {};
  counts.all = camps.filter(c => !c.expired).length;
  for (const cat of CATS) counts[cat] = camps.filter(c => c.category === cat && !c.expired).length;

  document.getElementById('tabBar').innerHTML =
    `<span class="tab${activeTab==='all'?' active':''}" data-tab="all">全部 <span class="tab-count">${counts.all}</span></span>` +
    CATS.map(c => `<span class="tab${activeTab===c?' active':''}" data-tab="${c}">${catLabels[c]} <span class="tab-count">${counts[c]||0}</span></span>`).join('');
}

function renderList() {
  let filtered = camps.filter(c => !c.expired);
  if (activeTab !== 'all') filtered = filtered.filter(c => c.category === activeTab);
  filtered.sort((a,b) => {
    const da = a.apply_deadline ? new Date(a.apply_deadline) : new Date('2099-01-01');
    const db = b.apply_deadline ? new Date(b.apply_deadline) : new Date('2099-01-01');
    return da - db;
  });

  const container = document.getElementById('campList');
  if (filtered.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--sub)">📭 暂无该分类的招生信息</div>';
    return;
  }

  container.innerHTML = filtered.map(c => `
    <div class="camp-card ${c.category}${c.expired?' expired':''}" data-id="${c.id}">
      <div class="card-header">
        <div>
          <span class="university">${c.university}</span>
          <span class="school"> · ${c.school}</span>
        </div>
      </div>
      <div class="card-badges">
        <span class="badge ${c.type}">${typeLabels[c.type]||c.type}</span>
        <span class="badge ${c.degree}">${degreeLabels[c.degree]||c.degree}</span>
        ${c.outstanding_offer?'<span class="badge outstanding">优营=录取</span>':''}
      </div>
      <div class="card-title">${c.title}</div>
      <div class="card-meta">
        ${c.location?`<span>📍 ${c.location}</span>`:''}
        ${c.camp_date?`<span>📅 ${c.camp_date}</span>`:''}
        ${c.major?`<span>📚 ${c.major.substring(0,30)}${c.major.length>30?'…':''}</span>`:''}
      </div>
      <div class="card-footer">
        <span class="deadline ${getDeadlineClass(c.apply_deadline)}">⏰ 报名截止: ${formatDeadline(c.apply_deadline)}</span>
        <span style="color:var(--sub)">${c.quota?c.quota+'人':''}</span>
      </div>
    </div>
  `).join('');
}

function showDetail(id) {
  const c = camps.find(c => c.id === id);
  if (!c) return;
  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <h2 style="font-size:0.95rem;margin-bottom:6px">${c.title}</h2>
    <div class="detail-section"><h3>学校/院系</h3><p>${c.university} · ${c.school}</p></div>
    <div class="detail-section"><h3>地点</h3><p>${c.location||'--'}</p></div>
    <div class="detail-section"><h3>类型 / 学位</h3><p>
      <span class="badge ${c.type}">${typeLabels[c.type]||c.type}</span>
      <span class="badge ${c.degree}">${degreeLabels[c.degree]||c.degree}</span>
      ${c.outstanding_offer?'<span class="badge outstanding">优营=录取</span>':''}
    </p></div>
    <div class="detail-section"><h3>面向对象</h3><p>${c.target||'--'}</p></div>
    <div class="detail-section"><h3>专业要求</h3><p>${c.major||'--'}</p></div>
    <div class="detail-section"><h3>报名要求</h3><p>${c.requirements||'--'}</p></div>
    <div class="detail-section"><h3>报名截止</h3><p class="deadline ${getDeadlineClass(c.apply_deadline)}">${formatDeadline(c.apply_deadline)}</p></div>
    <div class="detail-section"><h3>夏令营时间</h3><p>${c.camp_date||'--'}</p></div>
    <div class="detail-section"><h3>名额</h3><p>${c.quota?c.quota+'人':'--'}</p></div>
    <div class="detail-section"><h3>待遇</h3><p>${c.benefits||'--'}</p></div>
    ${c.link ? `<a class="detail-link" href="${c.link}" target="_blank" rel="noopener">查看官网详情 →</a>` : ''}
  `;
  panel.classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function renderFooter() {
  const total = camps.filter(c => !c.expired).length;
  document.getElementById('footerStats').innerHTML = `共收录 <b>${camps.length}</b> 项 · <b>${total}</b> 项活跃`;
}

document.getElementById('tabBar').addEventListener('click', e => {
  const tab = e.target.closest('[data-tab]');
  if (!tab) return;
  activeTab = tab.dataset.tab;
  renderTabs();
  renderList();
});

document.getElementById('campList').addEventListener('click', e => {
  const card = e.target.closest('.camp-card[data-id]');
  if (!card) return;
  showDetail(card.dataset.id);
});

document.getElementById('overlay').addEventListener('click', closeDetail);

async function loadData() {
  try {
    const resp = await fetch('/data/camps.json', { cache: 'no-cache' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    camps = data.camps;
    document.getElementById('updateTime').textContent =
      '更新于 ' + (data.updated_at ? data.updated_at.slice(0,16).replace('T',' ') : '未知');
    renderTabs();
    renderList();
    renderFooter();
  } catch (err) {
    document.getElementById('campList').innerHTML = '<div style="text-align:center;padding:40px;color:var(--sub)">⚠️ 数据加载失败，请检查网络后刷新</div>';
  }
}

document.addEventListener('DOMContentLoaded', loadData);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
